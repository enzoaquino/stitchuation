name: Deploy API

on:
  push:
    tags:
      - 'api/dev/v*'

env:
  RESOURCE_GROUP: rg-stitchuation-dev
  CONTAINER_APP_NAME: ca-stitchuation-dev-api
  ACR_NAME: acrstitchuationdev

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: stitchuation_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stitchuation_test
      JWT_SECRET: test-secret
      JWT_REFRESH_SECRET: test-refresh-secret
      STORAGE_PROVIDER: local
      APPLE_BUNDLE_ID: com.enzoaquino.stitchuation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json
      - run: npm ci
      - run: npx drizzle-kit migrate
      - run: npx vitest run

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          TAG=${GITHUB_REF#refs/tags/api/dev/}
          az acr login --name ${{ env.ACR_NAME }}
          docker build --platform linux/amd64 -t ${{ env.ACR_NAME }}.azurecr.io/api:${TAG} -t ${{ env.ACR_NAME }}.azurecr.io/api:latest apps/api
          docker push ${{ env.ACR_NAME }}.azurecr.io/api:${TAG}
          docker push ${{ env.ACR_NAME }}.azurecr.io/api:latest

      - name: Deploy to Container App
        run: |
          TAG=${GITHUB_REF#refs/tags/api/dev/}
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/api:${TAG}
